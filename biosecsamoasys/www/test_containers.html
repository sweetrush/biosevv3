<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Types Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container-item {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .container-item label { font-weight: bold; display: block; margin-bottom: 5px; }
        .container-item small { color: #666; display: block; margin-bottom: 5px; }
        .container-item input { padding: 5px; width: 100px; }
    </style>
</head>
<body>
    <h1>Container Types Loading Test</h1>
    <p>This page tests if container types are loading from the API.</p>

    <div id="status">Loading container types...</div>

    <div id="containerList"></div>

    <script>
        console.log('Page loaded, fetching container types...');

        fetch('api/get_container_types.php')
            .then(response => {
                console.log('Response received:', response);
                return response.json();
            })
            .then(data => {
                console.log('Data parsed:', data);

                const statusDiv = document.getElementById('status');
                const containerList = document.getElementById('containerList');

                if (data.success && data.data) {
                    statusDiv.innerHTML = `<strong style="color: green;">✓ Successfully loaded ${data.data.length} container types!</strong>`;

                    data.data.forEach(containerType => {
                        const containerItem = document.createElement('div');
                        containerItem.className = 'container-item';

                        containerItem.innerHTML = `
                            <label>${containerType.container_type_name}</label>
                            <small>Code: ${containerType.container_type_code}</small>
                            <small>Description: ${containerType.description}</small>
                            <input type="text" placeholder="Count" name="container_${containerType.container_type_code}">
                        `;

                        containerList.appendChild(containerItem);
                    });
                } else {
                    statusDiv.innerHTML = '<strong style="color: red;">✗ Failed to load container types!</strong>';
                    statusDiv.innerHTML += '<br>Error: ' + (data.message || 'Unknown error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('status').innerHTML = '<strong style="color: red;">✗ Network error: ' + error.message + '</strong>';
            });
    </script>
</body>
</html>
